<!DOCTYPE html>
<html>
<head>
<title>Deal PDF</title>
</head>

<body>

<h1>🧾 Deal Report</h1>

<input id="address" placeholder="Address"><br>
<input id="profit" placeholder="Profit"><br>

<button onclick="gen()">Generate</button>

<div id="r"></div>

<script>
function gen(){
r.innerHTML=`<h2>${address.value}</h2><p>$${profit.value}</p>`;
window.print();
}
</script>

</body>
</html>
