<style>
body {
  font-family: Arial;
  background:#0f172a;
  color:white;
  padding:20px;
}

.container {
  max-width:600px;
  margin:auto;
}

input, button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button {
  background:#22c55e;
  font-weight:bold;
}

.card {
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}
</style>

<div class="container">

<h1>🧠 Deal Generator</h1>

<input id="address" placeholder="Property Address">
<input id="arv" placeholder="ARV">
<input id="price" placeholder="Purchase Price">
<input id="repairs" placeholder="Repairs">

<button onclick="generateDeal()">Generate Deal</button>

<div id="output" class="card"></div>

</div>

<script>
function generateDeal() {
  let address = document.getElementById("address").value;
  let arv = parseInt(document.getElementById("arv").value);
  let price = parseInt(document.getElementById("price").value);
  let repairs = parseInt(document.getElementById("repairs").value);

  let total = price + repairs;
  let profit = arv - total;

  let score = Math.round((profit / arv) * 100);

  let deal = {
    address: address,
    arv: arv,
    profit: profit,
    status: "New",
    score: score
  };

  document.getElementById("output").innerHTML = `
    <h3>🔥 Deal Created</h3>
    <p>Profit: $${profit}</p>
    <p>Score: ${score}</p>

    <h4>📋 Copy This:</h4>
    <pre>${JSON.stringify(deal, null, 2)}</pre>
  `;
}
    </script>
