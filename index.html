<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RO’Lyfe Dashboard</title>

<style>
body {font-family:Arial;background:#0f172a;color:white;padding:15px;}
h1 {text-align:center;color:#22c55e;}

.nav, .grid {display:flex;flex-direction:column;gap:10px;}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:12px;
}

.btn {
  background:#1e293b;
  padding:14px;
  border-radius:10px;
  color:#22c55e;
  text-align:center;
  text-decoration:none;
  border:1px solid #334155;
}

.btn:hover {background:#22c55e;color:#0f172a;}

.hot {border-left:5px solid #22c55e;}
.mid {border-left:5px solid #eab308;}
.low {border-left:5px solid #ef4444;}
</style>
</head>

<body>

<h1>🔥 RO’Lyfe Command Center</h1>

<div class="nav">
<a href="deal_terminal.html" class="btn">⚙️ Deal Terminal</a>
<a href="deal_generator.html" class="btn">🧠 Deal Generator</a>
<a href="deal_to_pdf.html" class="btn">🧾 Export Deal PDF</a>
<a href="funding.html" class="btn">🏦 Funding Hub</a>
<a href="invest.html" class="btn">💰 Invest</a>
<a href="media.html" class="btn">🎥 Media</a>
</div>

<h2>📊 Live Deals</h2>

<select onchange="filterDeals(this.value)">
<option value="all">All</option>
<option value="80">Hot</option>
<option value="50">Mid</option>
</select>

<div id="deals"></div>

<script>
let allDeals=[];

fetch('deals.json')
.then(r=>r.json())
.then(d=>{allDeals=d;displayDeals(d);});

function displayDeals(data){
let c=document.getElementById("deals");
c.innerHTML="";
data.forEach(d=>{
let level="low";
if(d.score>=80)level="hot";
else if(d.score>=50)level="mid";

let div=document.createElement("div");
div.className="card "+level;

div.innerHTML=`
<h3>${d.address}</h3>
<p>Profit: $${d.profit}</p>
<p>Score: ${d.score}</p>
<a href="invest.html" class="btn">💰 Fund</a>
`;
c.appendChild(div);
});
}

function filterDeals(val){
if(val=="all")return displayDeals(allDeals);
displayDeals(allDeals.filter(d=>val=="80"?d.score>=80:d.score>=50&&d.score<80));
}
</script>

</body>
</html>
